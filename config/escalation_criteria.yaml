# Per-category escalation criteria: whether it requires human QA, an
# optional velocity-threshold override, and a first-response playbook.
# Dashboard-editable (Settings tab) -- see radar/config.py.
categories:
  api_abuse:
    requires_qa: true
    velocity_threshold: null
    response_template: Confirm the abuse pattern (rate limits, scripted misuse) with
      eng before any public response. Not customer-facing until confirmed.
    action_items:
    - Confirm with engineering
    - Alert enterprise AE
    - Throttle output and monitor prompt usage
  product_bug:
    requires_qa: true
    velocity_threshold: null
    response_template: Reproduce with eng, get a fix/workaround ETA, then respond
      with what's confirmed -- avoid speculating on cause publicly.
    action_items:
    - File engineering ticket
    - Alert marketing/PMM
    - Log for minor triage
  ux_confusion:
    requires_qa: true
    velocity_threshold: null
    response_template: Low urgency unless velocity is high. A short clarifying reply
      or docs link is usually enough.
    action_items:
    - Send clarifying reply
  messaging_gap:
    requires_qa: true
    velocity_threshold: null
    response_template: Loop in Comms/PMM -- usually a documentation or expectation-setting
      gap, not a bug.
    action_items:
    - Notify Comms/PMM
  credential_theft:
    requires_qa: true
    velocity_threshold: null
    response_template: Escalate to security immediately. Do not confirm specifics
      publicly. Coordinate a private response with the reporter if possible.
    action_items:
    - File a ToS report
    - Lock the user's account
    - File a report to the platform to alert the affected user
  abuse:
    requires_qa: true
    velocity_threshold: null
    response_template: Escalate to Trust & Safety. Do not engage publicly until T&S
      has assessed scope and intent.
    action_items:
    - Escalate to Trust & Safety
  safety:
    requires_qa: true
    velocity_threshold: null
    response_template: Escalate immediately to Safety and executive channels. Treat
      as highest priority until triaged.
    action_items:
    - Escalate to Safety & Exec
  other:
    requires_qa: false
    velocity_threshold: null
    response_template: Triage manually -- doesn't fit an existing category cleanly.
    action_items:
    - Log manual triage
